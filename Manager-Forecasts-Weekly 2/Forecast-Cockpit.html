@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
* { box-sizing: border-box; }
.wfm, .wfm * { font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.wfm .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
.wfm {
  background:${B.ink}; color:${B.text}; min-height:100vh; width:100%;
  display:flex; flex-direction:column; -webkit-font-smoothing:antialiased;
}
.wfm button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
.wfm input, .wfm textarea, .wfm select {
  font-family:inherit; background:${B.ink}; color:${B.text};
  border:1px solid ${B.line}; border-radius:7px; padding:7px 9px; font-size:13px; outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.wfm input:focus, .wfm textarea:focus, .wfm select:focus {
  border-color:${B.accent}; box-shadow:0 0 0 3px rgba(76,194,255,.13);
}
.wfm input::placeholder, .wfm textarea::placeholder { color:${B.faint}; }

/* topbar */
.wfm .top { display:flex; align-items:center; gap:18px; padding:13px 22px;
  border-bottom:1px solid ${B.line}; background:linear-gradient(180deg,#171D25,${B.panel}); }
.wfm .brand { display:flex; flex-direction:column; line-height:1.1; }
.wfm .brand b { font-size:15px; font-weight:700; letter-spacing:-.2px; }
.wfm .brand span { font-size:10.5px; color:${B.muted}; letter-spacing:.5px; text-transform:uppercase; }
.wfm .gauge { flex:1; max-width:420px; }
.wfm .gauge .gl { display:flex; justify-content:space-between; font-size:11px; color:${B.muted}; margin-bottom:5px; }
.wfm .bar { height:8px; background:${B.panel2}; border-radius:99px; overflow:hidden; position:relative; }
.wfm .bar i { display:block; height:100%; border-radius:99px; transition:width .5s cubic-bezier(.2,.8,.2,1); }
.wfm .tpill { display:flex; flex-direction:column; align-items:flex-end; }
.wfm .tpill small { font-size:10px; color:${B.muted}; text-transform:uppercase; letter-spacing:.5px; }
.wfm .tpill b { font-size:18px; font-weight:600; }
.wfm .wk { display:flex; align-items:center; gap:8px; }

/* shell */
.wfm .shell { display:flex; flex:1; min-height:0; }
.wfm .nav { width:208px; border-right:1px solid ${B.line}; padding:14px 10px; background:${B.panel};
  display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
.wfm .nav button { display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:8px;
  font-size:13px; color:${B.muted}; text-align:left; transition:background .12s,color .12s; width:100%; }
.wfm .nav button:hover { background:${B.panel2}; color:${B.text}; }
.wfm .nav button.on { background:rgba(76,194,255,.12); color:${B.accent}; }
.wfm .nav button.on svg { color:${B.accent}; }
.wfm .nav .navtag { margin-left:auto; font-size:10px; padding:1px 6px; border-radius:99px;
  background:${B.down}; color:#fff; font-weight:600; }
.wfm .main { flex:1; overflow:auto; padding:24px 28px 60px; }
.wfm .main { animation:fade .35s ease; }
@keyframes fade { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

.wfm h2 { font-size:19px; font-weight:600; margin:0 0 3px; letter-spacing:-.3px; }
.wfm .sub { font-size:12.5px; color:${B.muted}; margin:0 0 18px; max-width:640px; line-height:1.5; }

/* cards */
.wfm .card { background:${B.panel}; border:1px solid ${B.line}; border-radius:12px; padding:16px 18px; }
.wfm .grid { display:grid; gap:14px; }
.wfm .tape { display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:12px; }
.wfm .mcard { background:${B.panel}; border:1px solid ${B.line}; border-radius:11px; padding:13px 14px; }
.wfm .mcard .mn { font-size:12px; color:${B.muted}; margin-bottom:7px; }
.wfm .mcard .mv { font-size:23px; font-weight:600; letter-spacing:-.5px; }
.wfm .delta { font-size:12px; display:inline-flex; align-items:center; gap:2px; margin-top:4px; }

/* table */
.wfm table { width:100%; border-collapse:collapse; }
.wfm th { text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.6px;
  color:${B.muted}; font-weight:600; padding:8px 10px; border-bottom:1px solid ${B.line}; }
.wfm td { padding:7px 10px; border-bottom:1px solid ${B.panel2}; font-size:13px; vertical-align:middle; }
.wfm tr:last-child td { border-bottom:none; }
.wfm td input, .wfm td select { width:100%; }
.wfm .cellnum input { text-align:right; font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; }

/* buttons */
.wfm .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 13px; border-radius:8px;
  font-size:13px; font-weight:500; transition:filter .12s,background .12s,border-color .12s; }
.wfm .btn.pri { background:${B.accent}; color:#06141d; font-weight:600; }
.wfm .btn.pri:hover { filter:brightness(1.08); }
.wfm .btn.gho { border:1px solid ${B.line}; color:${B.text}; }
.wfm .btn.gho:hover { border-color:${B.accent}; color:${B.accent}; }
.wfm .btn.sm { padding:5px 9px; font-size:12px; }
.wfm .ico { padding:6px; border-radius:7px; color:${B.faint}; transition:color .12s,background .12s; }
.wfm .ico:hover { color:${B.down}; background:${B.panel2}; }

.wfm .row { display:flex; align-items:center; gap:10px; }
.wfm .between { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.wfm .tag { font-size:10.5px; padding:2px 8px; border-radius:99px; font-weight:600; letter-spacing:.3px; }
.wfm .empty { border:1px dashed ${B.line}; border-radius:11px; padding:26px; text-align:center; color:${B.muted}; font-size:13px; }
.wfm .empty b { color:${B.text}; display:block; margin-bottom:4px; font-size:14px; }

/* tips */
.wfm .tip { display:flex; gap:12px; align-items:flex-start; padding:13px 14px; border:1px solid ${B.line};
  border-radius:11px; transition:border-color .12s; }
.wfm .tip.inc { border-color:rgba(63,185,80,.5); background:rgba(63,185,80,.05); }
.wfm .chk { width:21px; height:21px; border-radius:6px; border:1.5px solid ${B.line}; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; margin-top:1px; transition:all .12s; }
.wfm .chk.on { background:${B.up}; border-color:${B.up}; color:#06141d; }
.wfm .src { font-size:10px; padding:1px 7px; border-radius:99px; border:1px solid ${B.line}; color:${B.muted}; }

.wfm .out { background:${B.ink}; border:1px solid ${B.line}; border-radius:10px; padding:16px; font-size:13px;
  line-height:1.6; white-space:pre-wrap; max-height:440px; overflow:auto; }
.wfm .out .mono { font-size:12.5px; }
.wfm .notice { font-size:11.5px; color:${B.warn}; display:flex; gap:7px; align-items:flex-start;
  background:rgba(214,161,38,.08); border:1px solid rgba(214,161,38,.28); border-radius:9px; padding:9px 12px; }
.wfm label.fld { display:flex; flex-direction:column; gap:5px; font-size:11.5px; color:${B.muted}; }
.wfm .seg { display:inline-flex; border:1px solid ${B.line}; border-radius:8px; overflow:hidden; }
.wfm .seg button { padding:6px 12px; font-size:12px; color:${B.muted}; }
.wfm .seg button.on { background:${B.accent}; color:#06141d; font-weight:600; }
.wfm .drop { border:1.5px dashed ${B.line}; border-radius:11px; padding:32px 20px; text-align:center;
  cursor:pointer; transition:border-color .15s, background .15s, color .15s; color:${B.muted}; outline:none; }
.wfm .drop:hover, .wfm .drop:focus-visible { border-color:${B.accent}; color:${B.text}; }
.wfm .drop.over { border-color:${B.accent}; background:rgba(76,194,255,.07); color:${B.text}; }
.wfm .drop b { display:block; color:${B.text}; font-size:14px; margin-bottom:4px; }
.wfm .drop .di { color:${B.accent}; margin-bottom:8px; }
.wfm .map { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin:14px 0; }
.wfm .map label { font-size:11px; color:${B.muted}; display:flex; flex-direction:column; gap:5px; }
.wfm .map select.bad { border-color:${B.down}; }
.wfm .prev th, .wfm .prev td { padding:5px 9px; font-size:12px; }
.wfm .prev td { color:${B.text}; }
@media (prefers-reduced-motion: reduce){ .wfm *{ animation:none!important; transition:none!important; } }
